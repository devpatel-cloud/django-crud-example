<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if object %}Edit Task{% else %}Create New Task{% endif %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-card {
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            width: 400px;
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        form p {
            margin-bottom: 15px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-top: 5px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #43cea2;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit {
            background-color: #43cea2;
            color: white;
        }

        .btn-submit:hover {
            background-color: #36b892;
        }

        .nav-links {
            margin-top: 15px;
            text-align: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #185a9d;
            font-size: 14px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="form-card">
    <h3>
        {% if object %}Edit Task{% else %}Create New Task{% endif %}
    </h3>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <input type="submit" value="Submit" class="btn btn-submit">
    </form>

    <div class="nav-links">
        <a href="{% url 'tasks:task_list' %}">← Back to Task List</a>
    </div>
</div>

</body>
</html>
