<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delete Task</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --border: #e8e4dc;
      --border-dark: #d4cfc4;
      --text-primary: #1a1814;
      --text-muted: #8c8880;
      --text-faint: #b8b4ac;
      --danger: #c0392b;
      --danger-light: #fdf0ee;
      --danger-mid: #f0c8c4;
      --danger-hover: #a93226;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'Geist', sans-serif;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      animation: appear 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Nav */
    .nav-row {
      margin-bottom: 20px;
    }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--text-primary); }
    .nav-back svg { width: 14px; height: 14px; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.8) inset,
        0 12px 40px rgba(0,0,0,0.07),
        0 2px 8px rgba(0,0,0,0.04);
    }

    .card-header {
      padding: 28px 28px 24px;
      border-bottom: 1px solid var(--border);
    }

    /* Icon */
    .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--danger-light);
      border: 1px solid var(--danger-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }

    .icon-wrap svg {
      width: 20px;
      height: 20px;
      color: var(--danger);
    }

    .danger-label {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--danger);
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 13.5px;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Task chip */
    .task-chip-row {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--danger-light);
    }

    .task-chip-label {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 6px;
    }

    .task-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 1px solid var(--danger-mid);
      color: var(--danger);
      font-size: 13.5px;
      font-weight: 500;
      padding: 7px 12px;
      border-radius: 8px;
      max-width: 100%;
      word-break: break-word;
    }

    .task-chip svg {
      flex-shrink: 0;
      width: 13px;
      height: 13px;
      opacity: 0.6;
    }

    /* Actions */
    .card-footer {
      padding: 20px 28px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    .btn-cancel {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'Geist', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      padding: 12px 18px;
      background: var(--surface);
      border: 1px solid var(--border-dark);
      color: var(--text-muted);
      border-radius: 11px;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      cursor: pointer;
    }

    .btn-cancel:hover {
      background: var(--border);
      color: var(--text-primary);
    }

    .btn-delete {
      flex: 1.4;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-family: 'Geist', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      padding: 12px 18px;
      background: var(--danger);
      border: none;
      color: #fff;
      border-radius: 11px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .btn-delete::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn-delete svg { width: 14px; height: 14px; }

    .btn-delete:hover {
      background: var(--danger-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(192,57,43,0.3);
    }

    .btn-delete:active {
      transform: translateY(0);
      box-shadow: 0 3px 8px rgba(192,57,43,0.2);
    }

    /* Warning note */
    .warning-note {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 28px 18px;
      font-size: 11.5px;
      color: var(--text-faint);
      font-style: italic;
      background: var(--bg);
    }

    .warning-note svg {
      flex-shrink: 0;
      width: 12px;
      height: 12px;
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <div class="nav-row">
      <a href="javascript:history.back()" class="nav-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </a>
    </div>

    <div class="card">

      <div class="card-header">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </div>
        <p class="danger-label">Irreversible Action</p>
        <h1 class="card-title">Delete Task</h1>
        <p class="card-desc">You're about to permanently delete this task. This cannot be undone.</p>
      </div>

      <div class="task-chip-row">
        <p class="task-chip-label">Task to be deleted</p>
        <div class="task-chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
          </svg>
          {{ task }}
        </div>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="card-footer">
          <a href="javascript:history.back()" class="btn-cancel">Cancel</a>
          <button type="submit" class="btn-delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/>
            </svg>
            Delete Task
          </button>
        </div>
      </form>

      <div class="warning-note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        This action is permanent and cannot be recovered.
      </div>

    </div>
  </div>

</body>
</html>
