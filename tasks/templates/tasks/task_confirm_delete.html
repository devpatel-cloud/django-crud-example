<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delete Task</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --danger: #ff3b3b;
      --danger-dim: rgba(255, 59, 59, 0.12);
      --danger-glow: rgba(255, 59, 59, 0.35);
      --text-primary: #f0ede8;
      --text-muted: #888;
      --cancel-bg: #1e1e1e;
      --cancel-hover: #2a2a2a;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-primary);
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(255,59,59,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(255,100,50,0.04) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 32px 80px rgba(0,0,0,0.6);
      animation: rise 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Icon */
    .icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--danger-dim);
      border: 1px solid rgba(255,59,59,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      animation: pulse-border 2.5s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 var(--danger-glow); }
      50%       { box-shadow: 0 0 0 6px transparent; }
    }

    .icon-wrap svg {
      width: 26px;
      height: 26px;
      color: var(--danger);
    }

    /* Text */
    .label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--danger);
      margin-bottom: 10px;
      opacity: 0.85;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: 14px;
    }

    .description {
      font-size: 14.5px;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.65;
      margin-bottom: 10px;
    }

    /* Task chip */
    .task-name {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--danger-dim);
      border: 1px solid rgba(255,59,59,0.2);
      color: #ff8080;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      margin: 12px 0 32px;
      max-width: 100%;
      word-break: break-word;
    }

    .task-name svg {
      flex-shrink: 0;
      width: 13px;
      height: 13px;
      opacity: 0.7;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 10px;
    }

    .btn-cancel {
      flex: 1;
      padding: 13px 18px;
      background: var(--cancel-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-cancel:hover {
      background: var(--cancel-hover);
      color: var(--text-primary);
      border-color: #444;
    }

    .btn-delete {
      flex: 1.4;
      padding: 13px 18px;
      background: var(--danger);
      border: none;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: 11px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.01em;
    }

    .btn-delete::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn-delete:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(255,59,59,0.45);
    }

    .btn-delete:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(255,59,59,0.3);
    }

    /* Warning note */
    .warning-note {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      font-size: 12px;
      color: #555;
    }

    .warning-note svg {
      flex-shrink: 0;
      width: 13px;
      height: 13px;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
    </div>

    <p class="label">Irreversible Action</p>
    <h1>Delete Task</h1>
    <p class="description">You're about to permanently delete this task. This cannot be undone.</p>

    <div class="task-name">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      {{ task }}
    </div>

    <div class="divider"></div>

    <form method="post">
      {% csrf_token %}
      <div class="actions">
        <a href="javascript:history.back()" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-delete">Delete Task</button>
      </div>
    </form>

    <div class="warning-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      This action is permanent and cannot be recovered.
    </div>

  </div>

</body>
</html>
```
