<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delete Task</title>

  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --border: #e3e8f0;
      --border-dark: #cfd6e4;

      --text-primary: #1a1f2b;
      --text-muted: #6b7280;
      --text-faint: #9aa3b2;

      --danger: #2563eb;
      --danger-light: #eff6ff;
      --danger-mid: #bfdbfe;
      --danger-hover: #1d4ed8;

      --glass: rgba(255,255,255,0.7);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'Geist', sans-serif;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .nav-row {
      margin-bottom: 20px;
    }

    .nav-back {
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: 0.2s;
    }

    .nav-back:hover {
      color: var(--text-primary);
    }

    /* Card */
    .card {
      backdrop-filter: blur(10px);
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      transition: 0.25s;
      box-shadow:
        0 12px 40px rgba(0,0,0,0.08),
        0 2px 8px rgba(0,0,0,0.05);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.12);
    }

    .card-header {
      padding: 28px;
      border-bottom: 1px solid var(--border);
    }

    .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--danger-light);
      border: 1px solid var(--danger-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      font-size: 20px;
    }

    .danger-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--danger);
      margin-bottom: 8px;
      animation: blink 1.6s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 13.5px;
      color: var(--text-muted);
    }

    /* Task */
    .task-chip-row {
      padding: 16px 28px;
      background: var(--danger-light);
      border-bottom: 1px solid var(--border);
    }

    .task-chip-label {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 6px;
    }

    .task-chip {
      background: linear-gradient(135deg, #fff, #eef4ff);
      border: 1px dashed var(--danger);
      color: var(--danger);
      padding: 7px 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13.5px;
    }

    /* Buttons */
    .card-footer {
      padding: 20px 28px;
      display: flex;
      gap: 10px;
    }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border-dark);
      background: var(--surface);
      color: var(--text-muted);
      border-radius: 11px;
      text-align: center;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn-cancel:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .btn-delete {
      flex: 1.4;
      padding: 12px;
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 11px;
      cursor: pointer;
      font-weight: 500;
      animation: pulse 2s infinite;
      transition: 0.2s;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37,99,235,0.4); }
      70% { box-shadow: 0 0 0 10px rgba(37,99,235,0); }
      100% { box-shadow: 0 0 0 0 rgba(37,99,235,0); }
    }

    .btn-delete:hover {
      background: var(--danger-hover);
    }

    .btn-delete:active {
      transform: scale(0.96);
    }

    .warning-note {
      padding: 12px 28px 18px;
      font-size: 11px;
      color: var(--text-faint);
      font-style: italic;
    }

  </style>
</head>

<body>

<div class="wrapper">

  <div class="nav-row">
    <a href="javascript:history.back()" class="nav-back">← Back</a>
  </div>

  <div class="card">

    <div class="card-header">
      <div class="icon-wrap">🗑️</div>
      <p class="danger-label">Irreversible Action</p>
      <h1 class="card-title">Delete Task</h1>
      <p class="card-desc">You're about to permanently delete this task.</p>
    </div>

    <div class="task-chip-row">
      <p class="task-chip-label">Task</p>
      <div class="task-chip">{{ task }}</div>
    </div>

    <form method="post">
      {% csrf_token %}

      <div class="card-footer">
        <a href="javascript:history.back()" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-delete">Delete Task</button>
      </div>
    </form>

    <div class="warning-note">
      This action cannot be undone.
    </div>

  </div>

</div>

</body>
</html>
